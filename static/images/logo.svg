<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="60" height="60">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f7ff" stroke="#004aad" stroke-width="2"/>
  
  <!-- Stethoscope -->
  <path d="M 60 80 Q 60 50 90 50 Q 120 50 120 80" fill="none" stroke="#004aad" stroke-width="6" stroke-linecap="round"/>
  <circle cx="60" cy="85" r="8" fill="#004aad"/>
  
  <!-- Medical Cross -->
  <g transform="translate(130, 100)">
    <rect x="-15" y="-3" width="30" height="6" fill="#00d4ff" rx="2"/>
    <rect x="-3" y="-15" width="6" height="30" fill="#00d4ff" rx="2"/>
  </g>
  
  <!-- Heart rate line -->
  <g transform="translate(90, 120)">
    <polyline points="0,10 5,10 10,5 15,15 20,10 25,10 30,10" fill="none" stroke="#0060b1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Person silhouette -->
  <g transform="translate(100, 140)">
    <circle cx="0" cy="-8" r="5" fill="#0060b1"/>
    <path d="M -8 -2 L 8 -2 L 5 5 L -5 5 Z" fill="#0060b1"/>
  </g>
  
  <!-- Accent color gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0060b1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#gradient)"/>
</svg>
